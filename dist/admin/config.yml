# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Sarvysh-D-Hulani/Sarvysh-D-Hulani
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b612fcbb-a063-4c5c-8fb3-879e70956fea/pkce
  auth_token_endpoint: /sites/b612fcbb-a063-4c5c-8fb3-879e70956fea/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://sarvysh-d-hulani.vercel.app

# Uploaded media (JPG/PNG/etc.) is stored in `public/` and served directly.
media_folder: 'public/images/uploads'
public_folder: '/images/uploads'

local_backend: true

collections:
  # ─── Global Site Settings ───
  - name: 'page'
    label: 'Site Content'
    folder: 'src/data/page'
    create: false
    delete: false
    extension: 'yml'
    format: 'yml'
    slug: '{{slug}}'
    fields:
      - { label: 'Page ID', name: 'name', widget: 'hidden', default: 'home' }
      - label: 'Hero Section'
        name: 'hero'
        widget: 'object'
        fields:
          - { label: 'Name', name: 'name', widget: 'string' }
          - { label: 'Tagline', name: 'tagline', widget: 'string' }
          - { label: 'Identity Statement', name: 'identity', widget: 'text' }
          - { label: 'Current Focus', name: 'currentFocus', widget: 'text' }
          - {
              label: 'Profile Image',
              name: 'profileImage',
              widget: 'image',
              choose_url: true,
              hint: 'Upload a JPG/PNG or paste an image URL.',
            }
          - label: 'Floating Cards'
            name: 'floatingCards'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            max: 2
            hint: 'The small floating badges over your photo (e.g. "Studying at BITS Pilani", "Focus AI Engineering"). Maximum of 2.'
            fields:
              - { label: 'Label (small text)', name: 'label', widget: 'string' }
              - { label: 'Value (bold text)', name: 'value', widget: 'string' }
              - {
                  label: 'Icon (Tabler icon name)',
                  name: 'icon',
                  widget: 'string',
                  required: false,
                  default: 'tabler:sparkles',
                }
          - label: 'Action Buttons'
            name: 'actions'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Button Text', name: 'text', widget: 'string' }
              - { label: 'Link', name: 'href', widget: 'string' }
              - {
                  label: 'Style',
                  name: 'variant',
                  widget: 'select',
                  options: ['primary', 'secondary'],
                  default: 'secondary',
                }
              - { label: 'Icon (Tabler icon name)', name: 'icon', widget: 'string', required: false }
      - label: 'Credentials Strip'
        name: 'credentials'
        widget: 'object'
        hint: 'The compact stats bar shown directly below the hero — school, grad year, focus area, open-to status.'
        fields:
          - label: 'Stats'
            name: 'stats'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            max: 5
            fields:
              - {
                  label: 'Label',
                  name: 'label',
                  widget: 'string',
                  hint: 'Short label shown in small caps, e.g. University',
                }
              - { label: 'Value', name: 'value', widget: 'string', hint: 'Bold text, e.g. BITS Pilani' }
              - {
                  label: 'Icon (Tabler icon name)',
                  name: 'icon',
                  widget: 'string',
                  required: false,
                  default: 'tabler:sparkles',
                }
      - label: 'Now Section'
        name: 'now'
        widget: 'object'
        fields:
          - { label: 'Currently Building (value)', name: 'building', widget: 'string' }
          - { label: 'Currently Learning (value)', name: 'learning', widget: 'string' }
          - { label: 'Currently Reading (value)', name: 'reading', widget: 'string' }
          - { label: 'Current Goal (value)', name: 'goal', widget: 'string' }
          - { label: 'Current Semester (value)', name: 'semester', widget: 'string' }
          - { label: 'Current Experiments (value)', name: 'experiments', widget: 'string' }
          - {
              label: 'Building — Card Label',
              name: 'buildingLabel',
              widget: 'string',
              default: 'Currently Building',
              required: false,
            }
          - {
              label: 'Learning — Card Label',
              name: 'learningLabel',
              widget: 'string',
              default: 'Currently Learning',
              required: false,
            }
          - {
              label: 'Reading — Card Label',
              name: 'readingLabel',
              widget: 'string',
              default: 'Currently Reading',
              required: false,
            }
          - {
              label: 'Goal — Card Label',
              name: 'goalLabel',
              widget: 'string',
              default: 'Current Goal',
              required: false,
            }
          - {
              label: 'Semester — Card Label',
              name: 'semesterLabel',
              widget: 'string',
              default: 'Current Semester',
              required: false,
            }
          - {
              label: 'Experiments — Card Label',
              name: 'experimentsLabel',
              widget: 'string',
              default: 'Current Experiments',
              required: false,
            }
      - label: 'About Section'
        name: 'about'
        widget: 'object'
        fields:
          - { label: 'Story', name: 'story', widget: 'text' }
          - label: 'Values'
            name: 'values'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
          - { label: 'Philosophy', name: 'philosophy', widget: 'text' }
          - label: 'Interests'
            name: 'interests'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Interest', name: 'interest', widget: 'string' }
          - label: 'Goals'
            name: 'goals'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Goal', name: 'goal', widget: 'string' }
          - label: "Things I'm Learning"
            name: 'learning'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Item', name: 'item', widget: 'string' }
          - label: 'Things I Believe'
            name: 'beliefs'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Belief', name: 'belief', widget: 'string' }
          - label: 'FAQ'
            name: 'faq'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Question', name: 'question', widget: 'string' }
              - { label: 'Answer', name: 'answer', widget: 'text' }
      - label: 'Contact Section'
        name: 'contact'
        widget: 'object'
        fields:
          - { label: 'Title', name: 'title', widget: 'string' }
          - { label: 'Subtitle', name: 'subtitle', widget: 'text' }
          - { label: 'Email', name: 'email', widget: 'string' }
          - label: 'Social Links'
            name: 'socials'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Label', name: 'label', widget: 'string' }
              - { label: 'URL', name: 'href', widget: 'string' }
              - { label: 'Icon (Tabler icon name)', name: 'icon', widget: 'string', required: false }
      - label: 'Explore More Divider'
        name: 'exploreDivider'
        widget: 'object'
        hint: 'The "Explore More" divider between the primary content (hero/projects/now) and secondary content (journey, gallery, etc.).'
        fields:
          - { label: 'Label (pill text)', name: 'label', widget: 'string', default: 'Explore More' }
          - {
              label: 'Description (line below pill)',
              name: 'description',
              widget: 'string',
              default: "Journey, knowledge, gallery, writing and more — there's a lot going on. Dig in.",
            }
      - label: 'Homepage Sections'
        name: 'sections'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        hint: 'Controls order, visibility, and all text for each homepage section.'
        fields:
          - {
              label: 'Section ID',
              name: 'id',
              widget: 'string',
              hint: 'e.g. hero, featured-projects, now, journey-timeline',
            }
          - { label: 'Display Title (section heading)', name: 'title', widget: 'string', required: false }
          - { label: 'Subtitle / Description', name: 'subtitle', widget: 'string', required: false }
          - { label: 'Tagline (small caps label above title)', name: 'tagline', widget: 'string', required: false }
          - {
              label: 'Section Number (e.g. 01, 02)',
              name: 'sectionNumber',
              widget: 'string',
              required: false,
              hint: 'The large watermark number shown in the section header.',
            }
          - {
              label: '"View All" Button Text',
              name: 'viewAllText',
              widget: 'string',
              required: false,
              hint: 'e.g. View All Projects',
            }
          - {
              label: '"View All" Button Link',
              name: 'viewAllHref',
              widget: 'string',
              required: false,
              hint: 'e.g. /projects',
            }
          - { label: 'Visible', name: 'visible', widget: 'boolean', default: true }

  # ─── Projects ───
  - name: 'project'
    label: 'Projects'
    folder: 'src/data/project'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - {
          label: 'Cover Image',
          name: 'coverImage',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - label: 'Gallery Images'
        name: 'gallery'
        widget: 'list'
        required: false
        field: { label: 'Image', name: 'image', widget: 'image', choose_url: true }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - label: 'Technologies'
        name: 'technologies'
        widget: 'list'
        required: false
        field: { label: 'Technology', name: 'tech', widget: 'string' }
      - {
          label: 'Status',
          name: 'status',
          widget: 'select',
          options: ['In Progress', 'Shipped', 'Archived'],
          default: 'In Progress',
        }
      - { label: 'GitHub URL', name: 'github', widget: 'string', required: false }
      - { label: 'Demo URL', name: 'demo', widget: 'string', required: false }
      - {
          label: 'Problem',
          name: 'problem',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Why I Built It',
          name: 'whyBuilt',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Process',
          name: 'process',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Challenges',
          name: 'challenges',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Learnings',
          name: 'learnings',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Future Improvements',
          name: 'futureImprovements',
          widget: 'markdown',
          required: false,
          hint: 'Supports bullet points — start a line with "- " to create a list.',
        }
      - {
          label: 'Key Outcome / Metric',
          name: 'outcome',
          widget: 'string',
          required: false,
          hint: 'One bold result line shown on the homepage card — e.g. "68% directional accuracy on 30-day backtest".',
        }
      - { label: 'Start Date', name: 'startDate', widget: 'datetime', required: false }
      - { label: 'End Date', name: 'endDate', widget: 'datetime', required: false }
      - { label: 'Featured', name: 'featured', widget: 'boolean', default: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - label: 'Attached Document'
        name: 'attachedFile'
        widget: 'file'
        required: false
        media_folder: 'public/files/projects'
        public_folder: '/files/projects'
        choose_url: false
        hint: 'Upload a .xlsx, .docx, or .pptx file to enable the document preview button on the project card.'
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Journey ───
  - name: 'journey'
    label: 'Journey'
    folder: 'src/data/journey'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Date', name: 'date', widget: 'datetime' }
      - {
          label: 'Type',
          name: 'type',
          widget: 'select',
          options: ['milestone', 'failure', 'lesson', 'achievement'],
          default: 'milestone',
        }
      - {
          label: 'Image',
          name: 'image',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Description', name: 'description', widget: 'text', required: false }
      - { label: 'Reflection', name: 'reflection', widget: 'text', required: false }
      - { label: 'Is Achievement', name: 'achievement', widget: 'boolean', default: false }
      - { label: 'Is Failure', name: 'failure', widget: 'boolean', default: false }
      - { label: 'Lesson Learned', name: 'lesson', widget: 'text', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Gallery ───
  - name: 'gallery'
    label: 'Gallery'
    folder: 'src/data/gallery'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - {
          label: 'Image',
          name: 'image',
          widget: 'image',
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Caption', name: 'caption', widget: 'string', required: false }
      - { label: 'Album', name: 'album', widget: 'string', required: false }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - { label: 'Date', name: 'date', widget: 'datetime', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Knowledge Hub ───
  - name: 'knowledge'
    label: 'Knowledge Hub'
    folder: 'src/data/knowledge'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - {
          label: 'Category',
          name: 'category',
          widget: 'select',
          options:
            ['AI', 'Engineering', 'Finance', 'Consulting', 'Productivity', 'Career', 'Learning', 'Research', 'Notes'],
          default: 'AI',
        }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - {
          label: 'Image',
          name: 'image',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime', required: false }
      - {
          label: 'Difficulty',
          name: 'difficulty',
          widget: 'select',
          options: ['Beginner', 'Intermediate', 'Advanced'],
          default: 'Beginner',
        }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Resources ───
  - name: 'resource'
    label: 'Resources'
    folder: 'src/data/resource'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Description', name: 'description', widget: 'text', required: false }
      - { label: 'Category', name: 'category', widget: 'string' }
      - {
          label: 'Difficulty',
          name: 'difficulty',
          widget: 'select',
          options: ['Beginner', 'Intermediate', 'Advanced'],
          default: 'Beginner',
        }
      - {
          label: 'Recommendation',
          name: 'recommendation',
          widget: 'select',
          options: ['Essential', 'Highly Recommended', 'Recommended'],
          default: 'Recommended',
        }
      - { label: 'Personal Notes', name: 'personalNotes', widget: 'text', required: false }
      - { label: 'Link', name: 'link', widget: 'string', required: false }
      - {
          label: 'Image',
          name: 'image',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Reading ───
  - name: 'reading'
    label: 'Reading'
    folder: 'src/data/reading'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Author', name: 'author', widget: 'string', required: false }
      - {
          label: 'Status',
          name: 'status',
          widget: 'select',
          options: ['Currently Reading', 'Finished', 'Want to Read'],
          default: 'Want to Read',
        }
      - { label: 'Rating (1-5)', name: 'rating', widget: 'number', min: 1, max: 5, required: false }
      - {
          label: 'Cover Image',
          name: 'coverImage',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Start Date', name: 'startDate', widget: 'datetime', required: false }
      - { label: 'Finish Date', name: 'finishDate', widget: 'datetime', required: false }
      - { label: 'Notes', name: 'notes', widget: 'text', required: false }
      - label: 'Quotes'
        name: 'quotes'
        widget: 'list'
        required: false
        field: { label: 'Quote', name: 'quote', widget: 'string' }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Newsletter ───
  - name: 'newsletter'
    label: 'Newsletter'
    folder: 'src/data/newsletter'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime' }
      - { label: 'Issue Number', name: 'issue', widget: 'number', required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Resume ───
  - name: 'resume'
    label: 'Resume'
    folder: 'src/data/resume'
    create: false
    delete: false
    extension: 'yml'
    format: 'yml'
    slug: '{{slug}}'
    fields:
      - { label: 'Page Title', name: 'title', widget: 'string' }
      - { label: 'Subtitle / Tagline', name: 'subtitle', widget: 'string', required: false }
      - label: 'Education'
        name: 'education'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        fields:
          - { label: 'School', name: 'school', widget: 'string' }
          - { label: 'Degree', name: 'degree', widget: 'string' }
          - { label: 'Graduation Year', name: 'graduationYear', widget: 'string', required: false }
          - label: 'Relevant Coursework'
            name: 'coursework'
            widget: 'list'
            required: false
            field: { label: 'Course', name: 'course', widget: 'string' }
      - label: 'Experience'
        name: 'experience'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        fields:
          - { label: 'Role / Title', name: 'role', widget: 'string' }
          - { label: 'Company / Organisation', name: 'company', widget: 'string' }
          - { label: 'Start Date', name: 'startDate', widget: 'string', required: false, hint: 'e.g. Jun 2025' }
          - { label: 'End Date', name: 'endDate', widget: 'string', required: false, hint: 'e.g. Aug 2025 or Present' }
          - { label: 'Description', name: 'description', widget: 'text', required: false }
      - label: 'Skills'
        name: 'skills'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        fields:
          - { label: 'Category', name: 'category', widget: 'string' }
          - label: 'Items'
            name: 'items'
            widget: 'list'
            field: { label: 'Skill', name: 'skill', widget: 'string' }
      - { label: "What I'm Looking For", name: 'lookingFor', widget: 'text', required: false }

  # ─── Writing (Blog Posts) ───
  - name: 'post'
    label: 'Writing'
    folder: 'src/data/post'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - {
          label: 'Image',
          name: 'image',
          widget: 'image',
          required: false,
          choose_url: true,
          hint: 'Upload a JPG/PNG or paste an image URL.',
        }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime', required: false }
      - { label: 'Author', name: 'author', widget: 'string', required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }
