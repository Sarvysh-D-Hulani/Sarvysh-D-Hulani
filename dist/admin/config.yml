# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Sarvysh-D-Hulani/Sarvysh-D-Hulani
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b612fcbb-a063-4c5c-8fb3-879e70956fea/pkce
  auth_token_endpoint: /sites/b612fcbb-a063-4c5c-8fb3-879e70956fea/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://sarvysh-d-hulani.vercel.app

# Uploaded media (images + documents) live in public/uploads and are served
# from the site root at /uploads/... so they resolve without Astro's asset
# hashing pipeline. Works for JPEG/PNG images and PDF/Office documents alike.
media_folder: 'public/uploads'
public_folder: '/uploads'

local_backend: true

collections:
  # ─── Global Site Settings ───
  - name: 'page'
    label: 'Site Content'
    folder: 'src/data/page'
    create: false
    delete: false
    extension: 'yml'
    format: 'yml'
    slug: '{{slug}}'
    fields:
      - { label: 'Page ID', name: 'name', widget: 'hidden', default: 'home' }
      - label: 'Hero Section'
        name: 'hero'
        widget: 'object'
        fields:
          - { label: 'Name', name: 'name', widget: 'string' }
          - { label: 'Tagline', name: 'tagline', widget: 'string' }
          - { label: 'Identity Statement', name: 'identity', widget: 'text' }
          - { label: 'Current Focus', name: 'currentFocus', widget: 'text' }
          - { label: 'Profile Image', name: 'profileImage', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
          - label: 'Availability Badge'
            name: 'badge'
            widget: 'object'
            required: false
            fields:
              - { label: 'Show Badge', name: 'visible', widget: 'boolean', default: true }
              - { label: 'Text', name: 'text', widget: 'string', default: 'Available for opportunities' }
          - { label: 'Show Rotating Ring Around Photo', name: 'showRotatingRing', widget: 'boolean', default: true, required: false }
          - label: 'Floating Info Cards (the two boxes over the photo)'
            name: 'cards'
            widget: 'list'
            required: false
            max: 2
            label_singular: 'Card'
            summary: '{{fields.value}}'
            collapsed: false
            hint: 'Up to two small cards shown over the profile photo.'
            fields:
              - { label: 'Label (small top text)', name: 'label', widget: 'string' }
              - { label: 'Value (bold text)', name: 'value', widget: 'string' }
              - { label: 'Icon (Tabler icon name)', name: 'icon', widget: 'string', default: 'tabler:sparkles', required: false }
          - label: 'Action Buttons'
            name: 'actions'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Button Text', name: 'text', widget: 'string' }
              - { label: 'Link', name: 'href', widget: 'string' }
              - { label: 'Style', name: 'variant', widget: 'select', options: ['primary', 'secondary'], default: 'secondary' }
              - { label: 'Icon (Tabler icon name)', name: 'icon', widget: 'string', required: false }
      - label: 'Now Section'
        name: 'now'
        widget: 'object'
        fields:
          - { label: 'Currently Building', name: 'building', widget: 'string' }
          - { label: 'Currently Learning', name: 'learning', widget: 'string' }
          - { label: 'Currently Reading', name: 'reading', widget: 'string' }
          - { label: 'Current Goal', name: 'goal', widget: 'string' }
          - { label: 'Current Semester', name: 'semester', widget: 'string' }
          - { label: 'Current Experiments', name: 'experiments', widget: 'string' }
      - label: 'About Section'
        name: 'about'
        widget: 'object'
        fields:
          - { label: 'Story', name: 'story', widget: 'text' }
          - label: 'Values'
            name: 'values'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
          - { label: 'Philosophy', name: 'philosophy', widget: 'text' }
          - label: 'Interests'
            name: 'interests'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Interest', name: 'interest', widget: 'string' }
          - label: 'Goals'
            name: 'goals'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Goal', name: 'goal', widget: 'string' }
          - label: 'Things I'm Learning'
            name: 'learning'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Item', name: 'item', widget: 'string' }
          - label: 'Things I Believe'
            name: 'beliefs'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            field: { label: 'Belief', name: 'belief', widget: 'string' }
          - label: 'FAQ'
            name: 'faq'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Question', name: 'question', widget: 'string' }
              - { label: 'Answer', name: 'answer', widget: 'text' }
      - label: 'Contact Section'
        name: 'contact'
        widget: 'object'
        fields:
          - { label: 'Title', name: 'title', widget: 'string' }
          - { label: 'Subtitle', name: 'subtitle', widget: 'text' }
          - { label: 'Email', name: 'email', widget: 'string' }
          - label: 'Social Links'
            name: 'socials'
            widget: 'list'
            allow_add: true
            allow_delete: true
            collapsed: false
            fields:
              - { label: 'Label', name: 'label', widget: 'string' }
              - { label: 'URL', name: 'href', widget: 'string' }
              - { label: 'Icon (Tabler icon name)', name: 'icon', widget: 'string', required: false }
      - label: 'Homepage Sections Visibility'
        name: 'sections'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        fields:
          - { label: 'Section ID', name: 'id', widget: 'string' }
          - { label: 'Title', name: 'title', widget: 'string' }
          - { label: 'Visible', name: 'visible', widget: 'boolean', default: true }

  # ─── Projects ───
  - name: 'project'
    label: 'Projects'
    folder: 'src/data/project'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Cover Image', name: 'coverImage', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - label: 'Gallery Images'
        name: 'gallery'
        widget: 'list'
        required: false
        field: { label: 'Image', name: 'image', widget: 'image', choose_url: true }
      - label: 'Documents (PDF, Word, Excel, PowerPoint)'
        name: 'documents'
        widget: 'list'
        required: false
        label_singular: 'Document'
        summary: '{{fields.title}}'
        hint: 'Upload PDF, Word (.doc/.docx), Excel (.xls/.xlsx) or PowerPoint (.ppt/.pptx) files. PDFs render inline; Office files open in an embedded viewer.'
        fields:
          - { label: 'Title', name: 'title', widget: 'string' }
          - { label: 'File', name: 'file', widget: 'file', hint: 'Upload a PDF, Word, Excel, or PowerPoint file' }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - label: 'Technologies'
        name: 'technologies'
        widget: 'list'
        required: false
        field: { label: 'Technology', name: 'tech', widget: 'string' }
      - { label: 'Status', name: 'status', widget: 'select', options: ['In Progress', 'Shipped', 'Archived'], default: 'In Progress' }
      - { label: 'GitHub URL', name: 'github', widget: 'string', required: false }
      - { label: 'Demo URL', name: 'demo', widget: 'string', required: false }
      - { label: 'Problem', name: 'problem', widget: 'text', required: false }
      - { label: 'Why I Built It', name: 'whyBuilt', widget: 'text', required: false }
      - { label: 'Process', name: 'process', widget: 'text', required: false }
      - { label: 'Challenges', name: 'challenges', widget: 'text', required: false }
      - { label: 'Learnings', name: 'learnings', widget: 'text', required: false }
      - { label: 'Future Improvements', name: 'futureImprovements', widget: 'text', required: false }
      - { label: 'Start Date', name: 'startDate', widget: 'datetime', required: false }
      - { label: 'End Date', name: 'endDate', widget: 'datetime', required: false }
      - { label: 'Featured', name: 'featured', widget: 'boolean', default: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Journey ───
  - name: 'journey'
    label: 'Journey'
    folder: 'src/data/journey'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Date', name: 'date', widget: 'datetime' }
      - { label: 'Type', name: 'type', widget: 'select', options: ['milestone', 'failure', 'lesson', 'achievement'], default: 'milestone' }
      - { label: 'Image', name: 'image', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Description', name: 'description', widget: 'text', required: false }
      - { label: 'Reflection', name: 'reflection', widget: 'text', required: false }
      - { label: 'Is Achievement', name: 'achievement', widget: 'boolean', default: false }
      - { label: 'Is Failure', name: 'failure', widget: 'boolean', default: false }
      - { label: 'Lesson Learned', name: 'lesson', widget: 'text', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Gallery ───
  - name: 'gallery'
    label: 'Gallery'
    folder: 'src/data/gallery'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Image', name: 'image', widget: 'image', choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Caption', name: 'caption', widget: 'string', required: false }
      - { label: 'Album', name: 'album', widget: 'string', required: false }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - { label: 'Date', name: 'date', widget: 'datetime', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Knowledge Hub ───
  - name: 'knowledge'
    label: 'Knowledge Hub'
    folder: 'src/data/knowledge'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Category', name: 'category', widget: 'select', options: ['AI', 'Engineering', 'Finance', 'Consulting', 'Productivity', 'Career', 'Learning', 'Research', 'Notes'], default: 'AI' }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - { label: 'Image', name: 'image', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime', required: false }
      - { label: 'Difficulty', name: 'difficulty', widget: 'select', options: ['Beginner', 'Intermediate', 'Advanced'], default: 'Beginner' }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Resources ───
  - name: 'resource'
    label: 'Resources'
    folder: 'src/data/resource'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Description', name: 'description', widget: 'text', required: false }
      - { label: 'Category', name: 'category', widget: 'string' }
      - { label: 'Difficulty', name: 'difficulty', widget: 'select', options: ['Beginner', 'Intermediate', 'Advanced'], default: 'Beginner' }
      - { label: 'Recommendation', name: 'recommendation', widget: 'select', options: ['Essential', 'Highly Recommended', 'Recommended'], default: 'Recommended' }
      - { label: 'Personal Notes', name: 'personalNotes', widget: 'text', required: false }
      - { label: 'Link', name: 'link', widget: 'string', required: false }
      - { label: 'Image', name: 'image', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Reading ───
  - name: 'reading'
    label: 'Reading'
    folder: 'src/data/reading'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Author', name: 'author', widget: 'string', required: false }
      - { label: 'Status', name: 'status', widget: 'select', options: ['Currently Reading', 'Finished', 'Want to Read'], default: 'Want to Read' }
      - { label: 'Rating (1-5)', name: 'rating', widget: 'number', min: 1, max: 5, required: false }
      - { label: 'Cover Image', name: 'coverImage', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Start Date', name: 'startDate', widget: 'datetime', required: false }
      - { label: 'Finish Date', name: 'finishDate', widget: 'datetime', required: false }
      - { label: 'Notes', name: 'notes', widget: 'text', required: false }
      - label: 'Quotes'
        name: 'quotes'
        widget: 'list'
        required: false
        field: { label: 'Quote', name: 'quote', widget: 'string' }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - { label: 'Display Order', name: 'order', widget: 'number', default: 100, required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown', required: false }

  # ─── Newsletter ───
  - name: 'newsletter'
    label: 'Newsletter'
    folder: 'src/data/newsletter'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime' }
      - { label: 'Issue Number', name: 'issue', widget: 'number', required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  # ─── Writing (Blog Posts) ───
  - name: 'post'
    label: 'Writing'
    folder: 'src/data/post'
    create: true
    delete: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Category', name: 'category', widget: 'string', required: false }
      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - { label: 'Image', name: 'image', widget: 'image', required: false, choose_url: true, hint: 'Upload a JPEG/PNG or paste an image URL' }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime', required: false }
      - { label: 'Author', name: 'author', widget: 'string', required: false }
      - { label: 'Draft', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Content', name: 'body', widget: 'markdown' }
