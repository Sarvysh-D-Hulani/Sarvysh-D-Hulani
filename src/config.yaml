site:
  name: 'Sarvysh D Hulani'
  site: 'https://sarvysh.vercel.app'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

metadata:
  title:
    default: 'Sarvysh D Hulani'
    template: '%s — Sarvysh D Hulani'
  description: 'AI engineer, builder, and BITS Pilani student. Exploring the intersection of artificial intelligence, product, and human potential.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Sarvysh D Hulani'
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@sarvysh'
    site: '@sarvysh'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/writing/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'writing'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
