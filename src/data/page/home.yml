about:
  story: >-
    I was the kid who took things apart before I understood how they went
    together. Radios, old motors, whatever I could get my hands on — and then
    too many books, always reaching a little past what I could actually digest.
    Most people grow out of that phase. I never did. I just got better tools.


    I'm an engineering student at BITS Pilani, and for a long time I thought that meant I was supposed to pick a lane. Science pulled at me. Then investment banking. Then AI. Then this restless urge to stop reading about how other people build things and just build them myself. I kept waiting for the moment I'd narrow down to one thing.


    That moment never came. Eventually, I stopped waiting for it.


    What I noticed instead is that none of these things were ever really separate. Valuing a company and designing a system run on the same instinct — figure out what's actually true underneath the noise. A pitch deck and a well-written essay are both just attempts to make an idea land clearly in someone else's head. Once I saw that, specializing early started to feel like the wrong goal. Connecting felt like the right one.


    So I started building the infrastructure for that — literally. This website isn't a resume. It's closer to a living archive: my projects, my writing, what I'm learning right now, and where all of it is headed. Nothing here is polished for an interviewer. It's just current.


    Alongside it, there's In Search Of — my newsletter, where I write in public about whatever I'm actually wrestling with the moment I sit down to write it. No pretending to have it figured out. Just the thinking, in real time.


    None of this is a side project running alongside my "real" path. This is the path. Proof, collected in public, that I'd rather understand something deeply and build with it than collect credentials and call that understanding.


    I think the next decade belongs to people who can bridge the gap between ambitious ideas and real, working systems — the ones who can move from a whiteboard to a working prototype without losing the idea in translation. That's the person I'm trying to become, one project, one essay, one late night at a time
  values:
    - title: Curiosity Over Comfort
      description: I choose the harder path when it teaches me more.
    - title: Build in Public
      description: Ideas are cheap. Shipping is everything. I document as I go.
    - title: Depth Over Breadth
      description: I go deep on the things that matter rather than skimming everything.
    - title: Genuine Always
      description: No personas, no pretending. What you see is what you get.
  philosophy: "The best way to predict your future is to build it, one project at
    a time, one lesson at a time. I believe in compounding: small daily
    improvements that, over years, create something remarkable. I believe in
    sharing: the best way to learn is to teach, and the best way to grow is to
    give. And I believe in patience: great things take time, and the journey is
    the destination."
  interests:
    - Artificial Intelligence & Machine Learning
    - Product Design & UX
    - Investing & Financial Markets
    - Philosophy & Psychology
    - Cricket & Chess
    - Science Fiction & Worldbuilding
  goals:
    - Become an AI engineer who ships products people use
    - Build a company before graduation
    - Invest in 10+ startups as an angel investor
    - Write a book about the AI revolution from a student perspective
    - Speak at a major tech conference
    - Maintain this website for 10+ years
  learning:
    - Advanced Deep Learning architectures
    - Distributed systems & infrastructure
    - Startup operations & venture capital
    - Technical writing & communication
    - Spanish (slowly but surely)
  beliefs:
    - AI will amplify human creativity, not replace it
    - The best education is self-directed
    - Your network is your net worth, but only if you add value first
    - Failure is data — collect it, analyze it, move on
    - Time is the only non-renewable resource
  faq:
    - question: Why BITS Pilani?
      answer: Because it is one of the few places in India where you can be both a
        serious student and a serious builder without choosing one over the
        other.
    - question: Why document everything publicly?
      answer: Because accountability works. Because someone else might be on the same
        path and feel less alone. Because future me will thank present me.
    - question: What is the end goal?
      answer: There is no end goal. The goal is to keep growing, keep building, and
        keep sharing. The journey is the destination.
    - question: How do you balance academics and building?
      answer: I do not balance them — I integrate them. Everything I build teaches me
        something academic, and everything I study informs what I build.
